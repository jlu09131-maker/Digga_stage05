{% extends "myapp/base.html" %}
{% block title %}My Vehicle | Digga{% endblock %}

{% block content %}
<aside class="h-screen w-64 fixed left-0 top-0 overflow-y-auto bg-surface-container-lowest flex flex-col py-8 z-40 border-r border-outline-variant/10">
    <div class="text-xl font-black text-primary-container px-6 mb-10 font-headline tracking-tighter uppercase">Digga</div>
    <div class="px-4 mb-8"><div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-surface-container-low"><div class="w-10 h-10 rounded-full bg-primary-container/15 flex items-center justify-center"><span class="material-symbols-outlined text-primary-container">person</span></div><div><p id="driverName" class="text-sm font-bold truncate">Loading…</p><p class="text-[0.65rem] uppercase">Driver</p></div></div></div>
    <nav class="flex-1 space-y-1 px-4">
        <a href="/driver/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-all text-sm">Dashboard</a>
        <a href="/request/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-all text-sm">Requests</a>
        <a href="/earning/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-all text-sm">Earnings</a>
        <a href="/driver/vehicle/" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-primary-container/10 text-primary-container border-r-4 border-primary-container text-sm">My Vehicle</a>
    </nav>
    <div class="px-4 mt-auto pt-8 border-t"><button id="logoutBtn" class="text-error text-sm w-full text-left">Logout</button></div>
</aside>

<main class="ml-64 p-8">
    <h1 class="text-4xl font-headline font-bold mb-8">My Vehicle</h1>
    <div class="glass-card p-6 rounded-2xl max-w-2xl">
        <div id="vehicleInfo" class="space-y-4"><div class="text-center py-8"><div class="spinner mx-auto"></div>Loading vehicle...</div></div>
        <div class="mt-6 pt-6 border-t border-outline-variant/10">
            <h3 class="font-bold mb-3">Update GPS Location</h3>
            <div class="flex gap-3"><input type="text" id="lat" placeholder="Latitude" class="bg-surface-container-high border border-outline-variant/30 rounded-lg px-3 py-2 text-sm flex-1"><input type="text" id="lng" placeholder="Longitude" class="bg-surface-container-high border border-outline-variant/30 rounded-lg px-3 py-2 text-sm flex-1"><button id="updateLocationBtn" class="bg-primary-container text-on-primary px-4 rounded-lg font-bold">Update</button></div>
            <button id="getCurrentLocationBtn" class="mt-3 text-xs text-primary-container">📍 Use my current location</button>
        </div>
    </div>
</main>

<script>
requireAuth(["Driver"]);
document.getElementById("driverName").innerText = localStorage.getItem("user_name") || "Driver";
document.getElementById("logoutBtn").onclick = () => logout();
let vehicleId = null;
async function loadVehicle() {
    const userId = localStorage.getItem("user_id");
    const res = await fetchWithAuth(`/api/vehicles/?driver=${userId}`);
    const vehicles = await safeJson(res);
    const container = document.getElementById("vehicleInfo");
    if (!Array.isArray(vehicles) || !vehicles.length) { container.innerHTML = `<div class="text-error">No vehicle assigned. Contact admin.</div>`; return; }
    const v = vehicles[0];
    vehicleId = v.vehicle_id;
    container.innerHTML = `<div class="flex justify-between"><span class="text-on-surface-variant">Type</span><span class="font-bold">${v.vehicle_type}</span></div><div class="flex justify-between"><span class="text-on-surface-variant">Capacity</span><span>${v.capacity || "N/A"}</span></div><div class="flex justify-between"><span class="text-on-surface-variant">Price/km</span><span>₹${v.price_per_km}</span></div><div class="flex justify-between"><span class="text-on-surface-variant">Status</span><span>${statusBadge(v.status)}</span></div><div class="flex justify-between"><span class="text-on-surface-variant">Current GPS</span><span id="currentGps">${v.driver_lat ? v.driver_lat + ", " + v.driver_lng : "Not set"}</span></div>`;
}
document.getElementById("updateLocationBtn").onclick = async () => {
    const lat = document.getElementById("lat").value; const lng = document.getElementById("lng").value;
    if (!lat || !lng) { showToast("Enter both lat & lng", "warning"); return; }
    const res = await fetchWithAuth(`/api/vehicles/${vehicleId}/location/`, { method: "PATCH", body: JSON.stringify({ lat: parseFloat(lat), lng: parseFloat(lng) }) });
    if (res.ok) { showToast("Location updated", "success"); loadVehicle(); } else showToast("Update failed", "error");
};
document.getElementById("getCurrentLocationBtn").onclick = () => {
    if (!navigator.geolocation) { showToast("Geolocation not supported", "error"); return; }
    navigator.geolocation.getCurrentPosition(pos => { document.getElementById("lat").value = pos.coords.latitude; document.getElementById("lng").value = pos.coords.longitude; showToast("Location fetched", "info"); }, () => showToast("Unable to get location", "error"));
};
loadVehicle();
</script>
{% endblock %}
