{% extends "myapp/base.html" %}
{% block title %}Track Ride | Digga{% endblock %}

{% block content %}
<header class="fixed top-0 w-full z-50 bg-surface/60 backdrop-blur-xl border-b border-outline-variant/15 flex justify-between items-center px-6 py-4">
    <a href="/" class="text-2xl font-bold tracking-tighter text-primary-container font-headline">Digga</a>
    <button onclick="logout()" class="px-3 py-2 rounded-lg bg-surface-container-high text-on-surface-variant hover:text-error text-sm">Logout</button>
</header>
<main class="pt-20 p-6 max-w-4xl mx-auto">
    <h1 class="text-3xl font-headline font-bold mb-6">Live Ride Tracking</h1>
    <div class="glass-card p-6 rounded-2xl mb-8">
        <div class="grid grid-cols-2 gap-4 mb-6"><div><span class="text-on-surface-variant text-sm">Booking ID</span><br><span id="bookingId" class="font-mono text-lg">—</span></div><div><span class="text-on-surface-variant text-sm">Status</span><br><span id="statusBadge">—</span></div><div><span class="text-on-surface-variant text-sm">Vehicle</span><br><span id="vehicleType" class="font-bold">—</span></div><div><span class="text-on-surface-variant text-sm">Driver</span><br><span id="driverName">—</span></div><div><span class="text-on-surface-variant text-sm">Pickup</span><br><span id="pickup">—</span></div><div><span class="text-on-surface-variant text-sm">Drop</span><br><span id="drop">—</span></div></div>
        <div class="bg-surface-container-high rounded-xl p-4 text-center"><div class="flex justify-center items-center gap-3"><div class="w-3 h-3 rounded-full bg-primary-container animate-pulse"></div><span id="driverLocationText" class="text-sm">Waiting for driver location...</span></div><div class="mt-3 text-xs text-on-surface-variant">Last updated: <span id="lastUpdate">—</span></div></div>
    </div>
    <div class="glass-card p-6 rounded-2xl"><h2 class="font-headline font-bold mb-3">📍 Map View (Simulated)</h2><div class="h-64 bg-surface-container-high rounded-xl flex items-center justify-center text-on-surface-variant/50"><span class="material-symbols-outlined text-6xl">map</span><span class="ml-2">Live GPS: <span id="coords">—</span></span></div></div>
</main>
<script>
requireAuth(["User"]);
const bookingId = {{ booking_id }};
let interval = null;
async function fetchTracking() {
    const res = await fetchWithAuth(`/api/bookings/${bookingId}/`);
    const booking = await safeJson(res);
    if (!booking.booking_id) return;
    document.getElementById("bookingId").innerText = `#${booking.booking_id}`;
    document.getElementById("statusBadge").innerHTML = statusBadge(booking.status);
    document.getElementById("vehicleType").innerText = booking.vehicle_detail?.vehicle_type || "—";
    document.getElementById("driverName").innerText = booking.vehicle_detail?.driver_name || "Unassigned";
    document.getElementById("pickup").innerText = booking.pickup_location;
    document.getElementById("drop").innerText = booking.drop_location;
    if (booking.vehicle_detail?.driver_lat && booking.vehicle_detail?.driver_lng) {
        const lat = booking.vehicle_detail.driver_lat; const lng = booking.vehicle_detail.driver_lng;
        document.getElementById("coords").innerText = `${lat}, ${lng}`;
        document.getElementById("driverLocationText").innerHTML = `📍 Driver at ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        document.getElementById("lastUpdate").innerText = new Date().toLocaleTimeString();
    }
    if (booking.status === "completed" || booking.status === "cancelled") { if (interval) clearInterval(interval); showToast("Ride has ended.", "info"); }
}
fetchTracking();
interval = setInterval(fetchTracking, 5000);
</script>
{% endblock %}
